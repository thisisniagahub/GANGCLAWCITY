version: '3.8'

services:
  # 1. Landing Page (Marketing)
  landing-page:
    build:
      context: ./landing-page
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    networks:
      - gangclawcity-network
    restart: unless-stopped

  # 2. Agent Town (Interactive Demo)
  agent-town:
    build:
      context: ./agent-town
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - gangclawcity-network
    restart: unless-stopped

  # 3. OpenClaw Office (Dashboard)
  openclaw-office:
    build:
      context: ./openclaw-office
      dockerfile: Dockerfile
    ports:
      - "5180:80"
    environment:
      - NODE_ENV=production
      - VITE_GATEWAY_URL=ws://localhost:18789
    networks:
      - gangclawcity-network
    restart: unless-stopped

  # 4. AI Town (Experimental)
  ai-town:
    build:
      context: ./ai-town
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=production
    networks:
      - gangclawcity-network
    restart: unless-stopped

  # 5. Star Office UI (Research)
  star-office-ui:
    build:
      context: ./Star-Office-UI
      dockerfile: Dockerfile
    ports:
      - "19000:80"
    environment:
      - FLASK_ENV=production
      - PORT=80
    networks:
      - gangclawcity-network
    restart: unless-stopped

networks:
  gangclawcity-network:
    driver: bridge
