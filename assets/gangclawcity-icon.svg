<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- GANGCLAWCITY Icon Only -->
  <!-- For: Favicon, Social Avatar, App Icon -->
  
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff"/>
      <stop offset="50%" style="stop-color:#e040fb"/>
      <stop offset="100%" style="stop-color:#ffc400"/>
    </linearGradient>
  </defs>
  
  <!-- Background Circle (optional) -->
  <circle cx="50" cy="50" r="48" fill="#06080f"/>
  
  <!-- Outer Glow -->
  <path d="M 50,10 L 84.64,30 L 84.64,70 L 50,90 L 15.36,70 L 15.36,30 Z" 
        fill="none" 
        stroke="#00e5ff" 
        stroke-width="2"
        opacity="0.3"/>
  
  <!-- Main Hexagon -->
  <path d="M 50,10 L 84.64,30 L 84.64,70 L 50,90 L 15.36,70 L 15.36,30 Z" 
        fill="none" 
        stroke="url(#iconGradient)" 
        stroke-width="4"
        stroke-linejoin="round"/>
  
  <!-- Inner Hexagon -->
  <path d="M 50,30 L 67.32,40 L 67.32,60 L 50,70 L 32.68,60 L 32.68,40 Z" 
        fill="url(#iconGradient)" 
        opacity="0.2"/>
  
  <!-- Center Dot -->
  <circle cx="50" cy="50" r="8" fill="url(#iconGradient)"/>
</svg>
